<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger</title>
    <link rel="stylesheet" href="/chat.css?v=20251119">
</head>
<body>
    <div class="chat-container">
        <!-- Заголовок для режима ожидания -->
        <div class="chat-header waiting-header">
            <h2>Messenger</h2>
        </div>

        <!-- Заголовок для режима чата (скрыт по умолчанию) -->
        <div class="chat-header connected-header" style="display: none;">
            <div class="user-info">
                <span class="user-nickname" id="partnerNickname">User</span>
                <span class="user-status online"></span>
            </div>
            <div class="header-menu">
                <button class="menu-dots">⋯</button>
                <div class="dropdown-menu">
                    <button class="menu-item" onclick="handleReport()">Report</button>
                    <button class="menu-item" onclick="handleExit()">Exit</button>
                </div>
            </div>
        </div>

        <div class="messages-container" id="messagesContainer">
            <!-- Системное сообщение будет добавляться динамически -->
        </div>

        <!-- Контейнер ожидания -->
        <div class="waiting-container" id="waitingContainer">
            <div class="waiting-timer" id="waitingTimer">30</div>
            <button class="go-back-button" onclick="goBack()">Go back</button>
        </div>

        <div class="input-container">
            <input type="text" id="messageInput" placeholder="Enter your message...">
            <button id="sendButton" onclick="sendMessage()">Send</button>
        </div>
    </div>
    <script src="/chat.js?v=20251119"></script>
</body>
</html>
